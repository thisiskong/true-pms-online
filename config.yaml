concurrency: 500
lock_file: "/var/run/pms-poller.lock"
leveldb_path: "./data/state.db"
device_cache_file: "./data/devices.json"

snmp_timeout: 5s
snmp_retries: 1

enable_ping:      false
ping_timeout:     1s
ping_count:       2     # echo requests per device; success = at least 1 reply; rtt = avg of received
ping_concurrency: 100   # max simultaneous in-flight pings

poll_log_dir: "./logs"
reboot_log_dir: "./logs"
log_retention_days: 7
log_level: "info"
log_format: "json"       # "json" or "text"
log_output: "stderr"     # "stderr", "stdout", or a directory path (e.g. "./logs")
log_rotate: false        # active: <log_output>/poll-uptime.log, archived: poll-uptime.YYYY-MM-DD.log

# Set via POLLER_POSTGRES_DSN env var or here
postgres_dsn: "postgresql://pmsonline:pmsonline@tyb-pms-etl-dv01.pms:5432/pmsonline?sslmode=disable&connect_timeout=10"
postgres_timeout: 10s
device_query: |
  SELECT ip, name,
         COALESCE(port, 161)::int,
         COALESCE(snmp_version, 2)::int,
         COALESCE(community, ''),
         COALESCE(security_name, ''),
         COALESCE(security_level, ''),
         COALESCE(auth_protocol, ''),
         COALESCE(auth_key, ''),
         COALESCE(priv_protocol, ''),
         COALESCE(priv_key, '')
  FROM device

reboot_pg_table: "device_reboot_event"
reboot_pg_timeout: 3s
pg_retry_queue_file: "./data/pg_retry.queue"

uptime_pg_table: "device_uptime"
uptime_batch_size: 500
pg_uptime_retry_queue_file: "./data/pg_uptime_retry.queue"

rollover_threshold_seconds: 42520176
max_value_streak_threshold: 3
max_consecutive_failures: 10
gap_reboot_threshold_seconds: 1800

prune_removed_devices: true
default_port: 161

pushgateway_url: ""
pushgateway_job: "pms_poller"
